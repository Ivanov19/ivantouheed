<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Tahsin Touheed Ivan</title>
  <script>(function(){try{var t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
  <style>
    /* ===== Neutral theme — change colors here ===== */
    :root {
      --bg:#ffffff;          /* page background */
      --ink:#1a1a1a;         /* main text */
      --muted:#6b6b6b;       /* secondary text, dates, labels */
      --link:#2f5e8a;        /* link / accent blue */
      --rule:#e8e8e8;        /* hairlines and borders */
      --accent:#1a1a1a;      /* headings & names (kept neutral black) */
      --accent-soft:#ececec; /* soft heading underline */
      --teal:#2f5e8a;        /* single accent — dates, active nav, hovers */
      --teal-soft:#eef4f9;   /* soft accent tint */
      --nav-track:#f1f0ee;   /* nav pill track background */
    }
    * { box-sizing:border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.7;
      max-width: 640px; margin: 0 auto; padding: 48px 24px 90px; font-size: 16px;
    }

    /* ===== Top navigation — centered segmented pill ===== */
    nav { display:flex; justify-content:center; margin-bottom:40px; }
    .nav-group {
      display:inline-flex; flex-wrap:wrap; justify-content:center; gap:2px;
      background:var(--nav-track); padding:3px; border-radius:10px;
    }
    nav a {
      color:var(--muted); text-decoration:none; font-style:normal;
      font-size:15px; font-weight:500; letter-spacing:0.01em;
      padding:7px 16px; border-radius:7px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    nav a:hover { color:var(--ink); }
    nav a.active {
      background:#ffffff; color:var(--ink);
      box-shadow:0 1px 2px rgba(0,0,0,0.06);   /* raised active pill */
    }

    h1 { font-size:26px; font-weight:600; margin:0 0 2px; }
    .tag { color: var(--muted); margin:0 0 22px; }
    img.photo { width:140px; height:140px; object-fit:cover; border-radius:12px; margin:10px 0 18px; }
    a { color: inherit; text-decoration: none; font-style: italic; }
    nav a, footer a, .seemore { font-style: normal; }
    .links a { margin-right:14px; font-size:14px; }
    hr { border:none; border-top:1px solid var(--rule); margin:34px 0; }
    h3 { font-size:15px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin:30px 0 14px; }
    .news p { margin:0 0 16px; }
    .date { color:var(--ink); font-weight:600; }
    ul { padding-left:18px; } li { margin-bottom:10px; }
    .muted { color:var(--muted); font-size:14px; }
    .post .meta { color:var(--muted); font-size:14px; margin-bottom:26px; }
    .post p { margin:0 0 18px; }
    .back { font-size:14px; text-decoration:none; }

    /* ===== Footer ===== */
    footer {
      margin-top:60px; padding-top:22px;
      border-top:1px solid var(--rule);
      font-size:14px; color:var(--muted);
      display:flex; flex-wrap:wrap; gap:8px 18px;
      align-items:center; justify-content:space-between;
    }
    footer .social a {
      color:var(--accent); text-decoration:none; margin-left:16px; font-weight:600;
    }
    footer .social a:first-child { margin-left:0; }
    footer .social a:hover { text-decoration:underline; }

    /* ===== Dark mode ===== */
    html[data-theme="dark"] {
      --bg:#12141a; --ink:#e7e8ea; --muted:#9aa1ab; --link:#8aa0b8; --rule:#2a2e37;
      --accent:#e7e8ea; --accent-soft:#2a2e37;
      --teal:#8aa0b8; --teal-soft:#1e2732; --nav-track:#1c1f27;
    }
    html[data-theme="dark"] nav a.active { background:#2b303b; color:var(--ink); box-shadow:none; }
    html[data-theme="dark"] .rail { background:#181b22; border-color:#2a2e37; }
    html[data-theme="dark"] span.tag { background:#242832; color:#c7ccd4; }
    html[data-theme="dark"] .cv-bar { background:#181b22; }
    html { transition: background 0.2s ease, color 0.2s ease; }

    /* ===== Day/Dark toggle (top-left) ===== */
    .theme-toggle {
      position:fixed; top:16px; left:16px; z-index:50;
      width:38px; height:38px; border-radius:50%;
      border:1px solid var(--rule); background:var(--nav-track);
      color:var(--ink); cursor:pointer; font-size:16px; line-height:1;
      display:inline-flex; align-items:center; justify-content:center;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .theme-toggle:hover { color:var(--teal); border-color:var(--teal); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>

  <!-- ===== Top nav (same on every page) ===== -->
  <!-- ===== Top nav (same on every page) — edit links/labels here ===== -->
  <nav>
    <div class="nav-group">
    <a href="index.html">About</a>
    <a href="research.html">Research</a>
    <a href="assets/CV.pdf">CV</a>
    <a class="active" href="blog.html">Blog</a>
    </div>
  </nav>

  <h1>Blog</h1>
  <p class="muted">Be welcomed at your own risk, you might cringe.</p>

  <!-- ===== One <li> per post. Newest on top. ===== -->
  <ul>
    <li><a href="posts/what-machine-learning-actually-is.html">So, What Is Machine Learning Again?</a> <span class="muted">— Jul 2026 · ML series 1/8</span></li>
    <li><a href="https://ivantouheed.wordpress.com/">Check out this site</a> <span class="muted">— Jan 2026</span></li>
  </ul>

  <!-- ===== Footer (same on every page) ===== -->
  <footer>
    <span>© 2026 Tahsin Touheed Ivan</span>
    <span class="social">
      <a href="mailto:ivan19tauhid@gmail.com">Email</a>
      <a href="https://github.com/Ivanov19">GitHub</a>
      <a href="https://www.facebook.com/ivan.tawhid.5">Facebook</a>
      <a href="https://www.goodreads.com/user/show/128025935-ivan-touheed">Goodreads [Are you a fellow book-geek too?]</a>
    </span>
  </footer>

  <script>
    (function(){
      var btn=document.getElementById('themeToggle');
      function sync(){var d=document.documentElement.getAttribute('data-theme')==='dark';
        btn.textContent=d?'☀':'🌙';
        btn.setAttribute('aria-label',d?'Switch to day mode':'Switch to dark mode');}
      sync();
      btn.addEventListener('click',function(){
        var d=document.documentElement.getAttribute('data-theme')==='dark';
        if(d){document.documentElement.removeAttribute('data-theme');try{localStorage.setItem('theme','light');}catch(e){}}
        else{document.documentElement.setAttribute('data-theme','dark');try{localStorage.setItem('theme','dark');}catch(e){}}
        sync();
      });
    })();
  </script>
</body>
</html>
