<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Tahsin Touheed Ivan</title>
  <style>
    /* ===== Neutral theme — change colors here ===== */
    :root {
      --bg:#ffffff;          /* page background */
      --ink:#1a1a1a;         /* main text */
      --muted:#6b6b6b;       /* secondary text, dates, labels */
      --link:#2f5e8a;        /* link / accent blue */
      --rule:#e8e8e8;        /* hairlines and borders */
      --accent:#1a1a1a;      /* headings & names (kept neutral black) */
      --accent-soft:#ececec; /* soft heading underline */
      --teal:#2f5e8a;        /* single accent — dates, active nav, hovers */
      --teal-soft:#eef4f9;   /* soft accent tint */
      --nav-track:#f1f0ee;   /* nav pill track background */
    }
    * { box-sizing:border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.7;
      max-width: 640px; margin: 0 auto; padding: 48px 24px 90px; font-size: 16px;
    }

    /* ===== Top navigation — centered segmented pill ===== */
    nav { display:flex; justify-content:center; margin-bottom:40px; }
    .nav-group {
      display:inline-flex; flex-wrap:wrap; justify-content:center; gap:2px;
      background:var(--nav-track); padding:3px; border-radius:10px;
    }
    nav a {
      color:var(--muted); text-decoration:none; font-style:normal;
      font-size:15px; font-weight:500; letter-spacing:0.01em;
      padding:7px 16px; border-radius:7px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    nav a:hover { color:var(--ink); }
    nav a.active {
      background:#ffffff; color:var(--ink);
      box-shadow:0 1px 2px rgba(0,0,0,0.06);   /* raised active pill */
    }

    h1 { font-size:26px; font-weight:600; margin:0 0 2px; }
    .tag { color: var(--muted); margin:0 0 22px; }
    img.photo { width:140px; height:140px; object-fit:cover; border-radius:12px; margin:10px 0 18px; }
    a { color: inherit; text-decoration: none; font-style: italic; }
    nav a, footer a, .seemore { font-style: normal; }
    .links a { margin-right:14px; font-size:14px; }
    hr { border:none; border-top:1px solid var(--rule); margin:34px 0; }
    h3 { font-size:15px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin:30px 0 14px; }
    .news p { margin:0 0 16px; }
    .date { color:var(--ink); font-weight:600; }
    ul { padding-left:18px; } li { margin-bottom:10px; }
    .muted { color:var(--muted); font-size:14px; }
    .post .meta { color:var(--muted); font-size:14px; margin-bottom:26px; }
    .post p { margin:0 0 18px; }
    .back { font-size:14px; text-decoration:none; }

    /* ===== Footer ===== */
    footer {
      margin-top:60px; padding-top:22px;
      border-top:1px solid var(--rule);
      font-size:14px; color:var(--muted);
      display:flex; flex-wrap:wrap; gap:8px 18px;
      align-items:center; justify-content:space-between;
    }
    footer .social a {
      color:var(--accent); text-decoration:none; margin-left:16px; font-weight:600;
    }
    footer .social a:first-child { margin-left:0; }
    footer .social a:hover { text-decoration:underline; }
  </style>
</head>
<body>
